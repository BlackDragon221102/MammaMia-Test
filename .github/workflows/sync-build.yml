name: Auto-Sync MammaMia Upstream

on:
  schedule:
    - cron: '0 * * * *'  # Esegue ogni ora
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  sync-upstream:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup files and force sync upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote get-url upstream || git remote add upstream https://github.com/UrloMythus/MammaMia.git
          git fetch upstream

          # Controlla se ci sono differenze PRIMA del reset
          if git diff --quiet HEAD upstream/main; then
            echo "Nessun aggiornamento disponibile dal creatore originale."
          else
            echo "Nuovo aggiornamento rilevato, avvio sincronizzazione..."

            backup_dir=".git/backup_files"
            mkdir -p "$backup_dir/.github/workflows"
            mkdir -p "$backup_dir/Dockerfiles"

            if [ -f config.json ]; then cp config.json "$backup_dir/config.json"; fi
            if [ -f update_domains.py ]; then cp update_domains.py "$backup_dir/update_domains.py"; fi
            if [ -d .github/workflows ]; then cp -r .github/workflows/* "$backup_dir/.github/workflows/"; fi
            if [ -d Dockerfiles ]; then cp -r Dockerfiles/* "$backup_dir/Dockerfiles/"; fi

            git checkout main || git checkout -b main
            git reset --hard upstream/main

            if [ -f "$backup_dir/config.json" ]; then cp "$backup_dir/config.json" config.json; fi
            if [ -f "$backup_dir/update_domains.py" ]; then cp "$backup_dir/update_domains.py" update_domains.py; fi
            
            mkdir -p .github/workflows
            if [ -d "$backup_dir/.github/workflows" ]; then cp -r "$backup_dir/.github/workflows/"* .github/workflows/; fi
            
            mkdir -p Dockerfiles
            if [ -d "$backup_dir/Dockerfiles" ]; then cp -r "$backup_dir/Dockerfiles/"* Dockerfiles/; fi

            git add .
            git commit -m "Auto-Sync: Ripristino configurazioni personali" || echo "Nessuna modifica da salvare"
            git push origin main --force
          fi
